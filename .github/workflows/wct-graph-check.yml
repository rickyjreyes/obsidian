name: WCT Graph Check

on:
  push:
    paths:
      - '.obsidian/plugins/wct-graph-engine/**'
      - 'Research/06 Experiments/**'
      - '.github/workflows/wct-graph-check.yml'
  pull_request:
    paths:
      - '.obsidian/plugins/wct-graph-engine/**'
      - 'Research/06 Experiments/**'
      - '.github/workflows/wct-graph-check.yml'
  workflow_dispatch:

jobs:
  syntax-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate JavaScript syntax
        run: find .obsidian/plugins/wct-graph-engine -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Validate Python syntax
        run: python -m py_compile .obsidian/plugins/wct-graph-engine/*.py
      - name: Validate JSON
        run: node -e "JSON.parse(require('fs').readFileSync('.obsidian/plugins/wct-graph-engine/manifest.json','utf8')); JSON.parse(require('fs').readFileSync('.obsidian/plugins/wct-graph-engine/data.json','utf8'));"
      - name: Run graph tests
        run: |
          set -euo pipefail
          for file in .obsidian/plugins/wct-graph-engine/tests/*.js; do
            echo "Running $file"
            node "$file"
          done
