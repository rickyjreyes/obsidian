name: WCT Graph Check

on:
  push:
    paths:
      - '.obsidian/plugins/wct-graph-engine/**'
      - '.github/workflows/wct-graph-check.yml'
  pull_request:
    paths:
      - '.obsidian/plugins/wct-graph-engine/**'
      - '.github/workflows/wct-graph-check.yml'
  workflow_dispatch:

jobs:
  syntax-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate JavaScript syntax
        run: |
          set -euo pipefail
          for file in .obsidian/plugins/wct-graph-engine/*.js .obsidian/plugins/wct-graph-engine/tests/*.js; do
            echo "Checking $file"
            node --check "$file"
          done
      - name: Validate manifest and data JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.obsidian/plugins/wct-graph-engine/manifest.json','utf8')); JSON.parse(require('fs').readFileSync('.obsidian/plugins/wct-graph-engine/data.json','utf8'));"
      - name: Test semantic references, stable IDs, and timeline
        run: node .obsidian/plugins/wct-graph-engine/tests/smoke.js
